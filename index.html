<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Co-Pilot: Interactive Journal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #003366; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: #003366; margin: 0; }
        .rules { background-color: #ffcccc; border-left: 5px solid #cc0000; padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .nav-buttons { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background-color: #e0e0e0; transition: 0.3s; }
        button.active { background-color: #003366; color: white; }
        button:hover:not(.active) { background-color: #ccc; }
        .section { display: none; }
        .section.active { display: block; }
        .instruction-box { background-color: #e6f0fa; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .prompt-box { background-color: #f9f9f9; border: 1px solid #ccc; padding: 10px; border-radius: 5px; font-family: monospace; margin: 10px 0; }
        textarea { width: 100%; height: 100px; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; resize: vertical; box-sizing: border-box; }
        .debrief { background-color: #fff9e6; border-left: 5px solid #ffcc00; padding: 15px; margin-top: 20px; }
        .submit-btn { background-color: #009900; color: white; font-size: 1.1em; width: 100%; padding: 15px; margin-top: 30px; }
        .submit-btn:hover { background-color: #007700; }
        @media print {
            .nav-buttons, .submit-btn { display: none; }
            .section { display: block !important; margin-bottom: 30px; border-bottom: 1px solid #ccc; padding-bottom: 20px; }
            body { background: white; }
            .container { box-shadow: none; padding: 0; }
            textarea { border: none; height: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>AI as Your Research Co-Pilot</h1>
        <p>Interactive Experiential Learning Journal</p>
    </div>

    <div class="rules">
        <strong>🚨 Reminder:</strong> NO PHI. Never input patient data into an LLM. Trust nothing; verify everything. You are the PI; the AI is the intern.
    </div>

    <div class="nav-buttons" id="nav-container">
        </div>

    <div id="content-container">
        </div>

    <button class="submit-btn" onclick="window.print()">🖨️ Export / Print Journal for Canvas Submission</button>
</div>

<script>
    const cycles = [
        {
            title: "1. Gaps",
            instructions: "Identify a key research gap in a topic of interest to you. Test the poor prompt, then test the strong prompt. Compare the results.",
            poor: "Write a literature review on [Topic], tell me what the research gaps are, and include citations.",
            strong: "Act as a research librarian. I am interested in [Topic]. What are 3 under-researched areas? Do not generate citations. Provide a Boolean search string and MeSH terms for PubMed.",
            debriefQ: "Did the AI hallucinate a fake DOI or author in the first test? How do we verify gaps using the provided search strings?"
        },
        {
            title: "2. Aims",
            instructions: "Draft a 1-sentence hypothesis for your project. Feed it to the AI using the 'Critical PI' prompt. Review the AI's feasibility feedback.",
            poor: "Write my Specific Aims page for a study on diabetes and wearables.",
            strong: "My core hypothesis is [hypothesis]. I have 4 months to complete this. Act as a critical PI. Point out feasibility flaws and suggest an outline for how to structure my Specific Aims page based on my hypothesis.",
            debriefQ: "Did the AI change the core scientific meaning of your hypothesis? How do we ensure the original thought remains yours while using AI to format the Aims?"
        },
        {
            title: "3. Methods",
            instructions: "Pick a study design for your proposed research topic. Ask the AI what statistical test to use for your specific variables. Challenge: Follow up by asking the AI for specific limitations.",
            poor: "What is the best way to study this dataset to get a significant p-value?",
            strong: "I am doing a retrospective chart review. Variables are X and Y. What are the standard statistical tests used for this data structure, and what are their limitations?",
            debriefQ: "Did the AI suggest a statistical test you've never heard of? How might bias creep into study design if we let the AI dictate the inclusion criteria?"
        },
        {
            title: "4. Coding",
            instructions: "Think of three variables you might collect. Prompt the AI to write an R or Python script to generate a basic demographic summary table. Review: Does it make logical sense?",
            poor: "Here is my patient data [csv file]. Clean it and run a regression.",
            strong: "I am using R. I have dummy variables named Age, BMI, and BP. Write an R script to check for missing values and create a basic demographic summary table.",
            debriefQ: "Even if we de-identify names, what combination of variables could constitute a HIPAA violation? How do we prevent the AI's script from manipulating our data or p-hacking?"
        },
        {
            title: "5. Visuals",
            instructions: "Think of a visual abstract for your topic. Ask the AI to outline a visual abstract. Have the AI generate a formal academic disclosure statement for using AI.",
            poor: "Make a graph showing my drug works better than the placebo.",
            strong: "Suggest a layout for a scientific poster based on my abstract. What icons should I use? Also, provide a standard AI-disclosure sentence I can print on the poster.",
            debriefQ: "If an AI generates a visual abstract, whose intellectual property is it? How do we clearly disclose AI use in our publications so we don't mislead our peers?"
        },
        {
            title: "6. Polish",
            instructions: "Draft a quick, messy 3-sentence paragraph. Ask the AI to 'Rewrite this to sound like a Harvard professor'. Then ask it to 'Point out grammatical errors and suggest 1 minor tweak for flow'. Compare the feeling of ownership.",
            poor: "Rewrite my whole discussion section to sound like a Harvard professor.",
            strong: "Act as a strict copyeditor. Review this paragraph for clarity. Highlight any confusing sentences and suggest minor tweaks to improve transition flow without changing my meaning: [draft]",
            debriefQ: "Where is the line between copyediting and ghostwriting? If the AI rewrites your discussion section entirely, is it still your paper?"
        }
    ];

    const navContainer = document.getElementById('nav-container');
    const contentContainer = document.getElementById('content-container');

    const savedData = JSON.parse(localStorage.getItem('aiWorkshopData')) || {};

    cycles.forEach((cycle, index) => {
        const btn = document.createElement('button');
        btn.innerText = cycle.title;
        btn.className = index === 0 ? 'active' : '';
        btn.onclick = () => showSection(index);
        navContainer.appendChild(btn);

        const section = document.createElement('div');
        section.className = `section ${index === 0 ? 'active' : ''}`;
        section.id = `section-${index}`;
        
        section.innerHTML = `
            <h2>Cycle ${cycle.title}</h2>
            <div class="instruction-box">
                <strong>Activity:</strong> ${cycle.instructions}
            </div>
            
            <p><strong>❌ 1. Try the Poor Prompt:</strong></p>
            <div class="prompt-box">${cycle.poor}</div>
            
            <p><strong>✅ 2. Try the Strong Prompt:</strong></p>
            <div class="prompt-box">${cycle.strong}</div>
            
            <p><strong>📝 3
